<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Profile — SecureAuth</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body style="align-items:flex-start; justify-content:center; padding:0;">
  <div class="orb-bottom"></div>

  <div class="dashboard-layout">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-icon">🔐</div>
        <span class="brand-name">SecureAuth</span>
      </div>
      <span class="sidebar-label">Navigation</span>
      <a class="nav-item" href="dashboard.html"><span class="icon">📊</span> Dashboard</a>
      <a class="nav-item active" href="profile.html"><span class="icon">👤</span> Profile</a>
      <a class="nav-item" id="nav-admin"   href="admin.html"   style="display:none;"><span class="icon">👑</span> Admin Panel</a>
      <a class="nav-item" id="nav-manager" href="manager.html" style="display:none;"><span class="icon">👔</span> Manager Panel</a>
      <a class="nav-item" id="nav-user"    href="user.html"    style="display:none;"><span class="icon">📁</span> User Area</a>
      <div class="sidebar-bottom">
        <div class="user-chip">
          <div class="avatar" id="sidebar-avatar">?</div>
          <div class="user-info">
            <div class="name" id="sidebar-name">Loading...</div>
            <div class="role-tag" id="sidebar-role">—</div>
          </div>
        </div>
        <button class="nav-item" onclick="logout()" style="margin-top:8px; color:var(--error);">
          <span class="icon">🚪</span> Logout
        </button>
      </div>
    </aside>

    <main class="main-content">
      <div class="page-header">
        <h1>My Profile 👤</h1>
        <p>Your account information</p>
      </div>

      <div id="alert-profile" class="alert"></div>

      <div style="display:flex; gap:16px; align-items:center; margin-bottom:32px;">
        <div class="avatar" style="width:72px;height:72px;font-size:28px;" id="big-avatar">?</div>
        <div>
          <div style="font-family:var(--font-display);font-size:24px;font-weight:800;" id="profile-name">—</div>
          <div id="profile-badge" style="margin-top:6px;">—</div>
        </div>
      </div>

      <div class="info-card">
        <div class="info-card-header">📋 Account Details</div>
        <div class="info-row">
          <span class="key">Full Name</span>
          <span class="val" id="detail-name">—</span>
        </div>
        <div class="info-row">
          <span class="key">Role</span>
          <span class="val" id="detail-role">—</span>
        </div>
        <div class="info-row">
          <span class="key">2FA</span>
          <span class="val" style="color:var(--accent3);">✅ Enabled</span>
        </div>
      </div>
    </main>
  </div>

  <script src="js/auth.js"></script>
  <script>
    requireAuth();
    populateSidebar();

    const token = getToken();
    const user = getUser();

    if (user) {
      document.getElementById("big-avatar").textContent = user.name[0].toUpperCase();
      document.getElementById("profile-name").textContent = user.name;
      document.getElementById("profile-badge").innerHTML =
        `<span class="badge badge-${user.role}">${user.role}</span>`;
      document.getElementById("detail-name").textContent = user.name;
      document.getElementById("detail-role").textContent = user.role;

      if (user.role === "admin") {
        document.getElementById("nav-admin").style.display = "flex";
      } else if (user.role === "manager") {
        document.getElementById("nav-manager").style.display = "flex";
      } else {
        document.getElementById("nav-user").style.display = "flex";
      }

      try {
        const payload = JSON.parse(atob(token.split(".")[1]));
        const detailId = document.getElementById("detail-id");
        if (detailId) detailId.textContent = payload.userId;
      } catch(e) {}
    }

    // Verify token with API
    (async () => {
      const res = await apiCall("/user/profile");
      if (!res.ok) {
        if (res.status === 403) showAlert("alert-profile", "Access denied.", "error");
        else if (res.status === 401) logout();
      }
    })();
  </script>
</body>
</html>
