<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — SecureAuth</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
  <div class="orb-bottom"></div>

  <div class="card">
    <div class="brand">
      <div class="brand-icon">🔐</div>
      <span class="brand-name">SecureAuth</span>
    </div>

    <div class="steps">
      <div class="step done">
        <div class="step-dot">✓</div>
        <div class="step-label">Register</div>
      </div>
      <div class="step done">
        <div class="step-dot">✓</div>
        <div class="step-label">Scan QR</div>
      </div>
      <div class="step active">
        <div class="step-dot">3</div>
        <div class="step-label">Login</div>
      </div>
    </div>

    <!-- Step 1: Password -->
    <div id="step-password">
      <h1>Welcome back</h1>
      <p class="subtitle">Sign in to your account</p>

      <div id="alert-login" class="alert"></div>

      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="you@example.com"
          onkeydown="if(event.key==='Enter') doLogin()"/>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Your password"
          onkeydown="if(event.key==='Enter') doLogin()"/>
      </div>

      <button class="btn btn-primary" id="btn-login" onclick="doLogin()">
        Continue →
      </button>

      <div class="link-row">Don't have an account? <a href="register.html">Register</a></div>
    </div>

    <!-- Step 2: 2FA -->
    <div id="step-2fa" style="display:none;">
      <h1>2FA Verification</h1>
      <p class="subtitle">Enter the 6-digit code from your authenticator app</p>

      <div id="alert-2fa" class="alert"></div>

      <div style="text-align:center; font-size:48px; margin: 24px 0;">🔑</div>

      <div class="form-group">
        <label>6-Digit Code</label>
        <input type="text" id="otp-code" placeholder="000000" maxlength="6"
          style="text-align:center; font-size:28px; letter-spacing:0.3em; font-weight:700;"
          onkeydown="if(event.key==='Enter') do2FA()"
          oninput="this.value=this.value.replace(/[^0-9]/g,'')"/>
      </div>

      <button class="btn btn-primary" id="btn-2fa" onclick="do2FA()">
        Verify & Login →
      </button>

      <button class="btn btn-secondary" onclick="backToPassword()">
        ← Back
      </button>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script>
    let currentUserId = null;

    async function doLogin() {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      hideAlert("alert-login");

      if (!email || !password) return showAlert("alert-login", "Please enter email and password.");

      setLoading("btn-login", true);

      try {
        const res = await fetch("http://localhost:3000/api/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();

        if (!res.ok) {
          showAlert("alert-login", data.message || "Login failed.");
        } else {
          currentUserId = data.userId;
          document.getElementById("step-password").style.display = "none";
          document.getElementById("step-2fa").style.display = "block";
          setTimeout(() => document.getElementById("otp-code").focus(), 100);
        }
      } catch (e) {
        showAlert("alert-login", "Cannot connect to server. Is it running?");
      }

      setLoading("btn-login", false);
    }

    async function do2FA() {
      const token = document.getElementById("otp-code").value.trim();
      hideAlert("alert-2fa");

      if (token.length !== 6) return showAlert("alert-2fa", "Please enter a 6-digit code.");

      setLoading("btn-2fa", true);

      try {
        const res = await fetch("http://localhost:3000/api/auth/verify-2fa", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ userId: currentUserId, token })
        });
        const data = await res.json();

        if (!res.ok) {
          showAlert("alert-2fa", data.message || "Invalid 2FA code.");
        } else {
          saveToken(data.token);

          // Decode token to get user info
          const payload = JSON.parse(atob(data.token.split(".")[1]));
          saveUser({ name: payload.name, role: payload.role, userId: payload.userId });

          window.location.href = "dashboard.html";
        }
      } catch (e) {
        showAlert("alert-2fa", "Connection error.");
      }

      setLoading("btn-2fa", false);
    }

    function backToPassword() {
      document.getElementById("step-2fa").style.display = "none";
      document.getElementById("step-password").style.display = "block";
    }

    if (getToken()) window.location.href = "dashboard.html";
  </script>
</body>
</html>
